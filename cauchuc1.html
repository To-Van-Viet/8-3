<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thiệp 8/3</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Hiệu ứng mở thiệp */
      .open-left,
      .open-right {
        position: fixed;
        top: 0;
        width: 50%;
        height: 100%;
        background: #ff4b5c;
        z-index: 999;
      }

      .open-left {
        left: 0;
        animation: openLeft 1s forwards;
      }

      .open-right {
        right: 0;
        animation: openRight 1s forwards;
      }

      @keyframes openLeft {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      }

      @keyframes openRight {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(100%);
        }
      }
    </style>
  </head>

  <body>
    <div class="open-left"></div>
    <div class="open-right"></div>
    <div class="card-container">
      <div class="card" onclick="flipCard()">
        <div class="card-front">
          💌 Gửi Phạm Thị Huyền Trang 💌<br /><br />
          (Nhấn để mở)
        </div>
        <div class="card-back">
          💐 Chúc bạn 8/3 thật vui vẻ<br />
          Luôn xinh đẹp, hạnh phúc và thành công ❤️
        </div>
      </div>
    </div>

    <script>
      function flipCard() {
        document.querySelector(".card").classList.toggle("flip");
      }
    </script>
  </body>
</html>
